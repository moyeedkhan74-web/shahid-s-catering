</div>

<!-- Bottom Sheet: Add Dish (UI only) -->
<div class="fixed inset-0 bg-black/80 z-[60] hidden opacity-0 transition-opacity duration-300 pointer-events-none" id="bottom-sheet-overlay" onclick="toggleBottomSheet(false)"></div>
<div class="bottom-sheet fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-max-container bg-surface-container-high z-[70] rounded-t-3xl border-t border-primary/30 p-edge-margin overflow-y-auto max-h-[85vh] custom-scrollbar" id="add-dish-sheet">
<div class="w-12 h-1 bg-outline-variant rounded-full mx-auto mb-stack-lg"></div>
<div class="flex justify-between items-center mb-stack-lg">
<h2 class="font-headline-md text-on-surface">Add Royal Dish</h2>
<button class="text-on-surface-variant p-2" onclick="toggleBottomSheet(false)"><span class="material-symbols-outlined">close</span></button>
</div>
<form class="space-y-gutter pb-10">
<div class="aspect-video w-full bg-surface-container-low rounded-2xl border-2 border-dashed border-primary/30 flex flex-col items-center justify-center group hover:border-primary transition-all cursor-pointer relative overflow-hidden">
<input accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-10" type="file"/>
<span class="material-symbols-outlined text-4xl text-primary/60 mb-2">add_a_photo</span>
<p class="text-label-sm text-on-surface-variant">Upload Dish Portrait</p>
</div>
<div class="space-y-stack-md">
<div class="relative">
<label class="block text-label-sm text-primary mb-1 uppercase tracking-widest">Name</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 px-0 text-on-surface focus:ring-0 focus:border-primary transition-colors" placeholder="Dish Name" type="text"/>
</div>
<div class="relative">
<label class="block text-label-sm text-primary mb-1 uppercase tracking-widest">Price (₹)</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 px-0 text-on-surface focus:ring-0 focus:border-primary transition-colors" placeholder="1250" type="number"/>
</div>
</div>
<button class="w-full bg-primary text-on-primary py-4 rounded-full font-bold shadow-lg shadow-primary/20 active:scale-95 transition-all mt-4" onclick="toggleBottomSheet(false)" type="button">
                Save to Royal Menu
            </button>
</form>
</div>
<script>
        function toggleBottomSheet(open) {
            const sheet = document.getElementById('add-dish-sheet');
            const overlay = document.getElementById('bottom-sheet-overlay');
            if (open) {
                overlay.classList.remove('hidden');
                setTimeout(() => {
                    overlay.classList.remove('opacity-0');
                    overlay.classList.add('opacity-100', 'pointer-events-auto');
                    sheet.classList.add('open');
                }, 10);
            } else {
                sheet.classList.remove('open');
                overlay.classList.remove('opacity-100', 'pointer-events-auto');
                overlay.classList.add('opacity-0');
                setTimeout(() => {
                    overlay.classList.add('hidden');
                }, 400);
            }
        }
    </script>
